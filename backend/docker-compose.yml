services:
  backend-postgres:
    image: postgres:16-alpine
    container_name: transan-backend-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    container_name: transan-backend-api
    build: .
    ports:
      - "8080:8080"
    networks:
      - default
      - transan-core
    depends_on:
      backend-postgres:
        condition: service_healthy
    env_file: .env

volumes:
  pgdata:

networks:
  transan-core:
    external: true
    name: transan-core
