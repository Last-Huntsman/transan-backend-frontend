syntax = "proto3";
package transan.analysis.v1;
option java_package = "com.transan.pb";
option java_outer_classname = "AnalysisProto";

message Spending {
  string id = 1;
  float sum = 2;
  string date = 3;
  string bank_category = 4;
  string bank_description = 5;
  string currency = 6;
  string category_name = 7;
  string comment = 8;
}

message User {
  string id = 1;
  int64 monthly_budget = 2;
  bool is_male = 3;
  repeated string unwanted_tags = 4;
}

message ForecastRequest {
  string id = 1;
  User user = 2;
  repeated Spending history = 3;
}

message ForecastResponse {
  string id = 1;
  string user_id = 2;
  optional string overall_comment = 3;
  repeated Spending spendings_forecasted = 4;
  int64 processed_at = 5;
}