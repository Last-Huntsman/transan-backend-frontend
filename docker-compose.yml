name: transan-web

services:
  backend-postgres:
    image: postgres:16-alpine
    container_name: transan-backend-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-transan_backend}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - backend-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend-api:
    container_name: transan-backend-api
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "8080:8080"
    depends_on:
      backend-postgres:
        condition: service_healthy
    networks:
      - default
      - transan-core

  frontend:
    container_name: transan-frontend-web
    build:
      context: ./frontend
    environment:
      VITE_API_URL: http://localhost:8080
      VITE_USE_MOCKS: "false"
    ports:
      - "5173:5173"
    depends_on:
      - backend-api
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules

volumes:
  backend-pgdata:
  frontend-node-modules:

networks:
  transan-core:
    external: true
    name: transan-core
